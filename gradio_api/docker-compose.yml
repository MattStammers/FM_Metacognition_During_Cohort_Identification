services:
  mixtral:
    build:
      context: .
    image: gradio-api:latest
    profiles: ["mixtral"]
    command: ["python", "src/mixtral_7b_t075.py"]
    environment:
      HF_ACCESS_TOKEN: ${HF_ACCESS_TOKEN}
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 9001
      GRADIO_DEBUG: ${GRADIO_DEBUG:-false}
      LOGS_DIR: ${LOGS_DIR:-/app/logs}
      MAX_MEMORY_PER_GPU: ${MAX_MEMORY_PER_GPU:-40GB}
      NVIDIA_VISIBLE_DEVICES: ${MIXTRAL_VISIBLE_GPUS:-0,1,2,3}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${MIXTRAL_HOST_BIND_IP:-127.0.0.1}:9001:9001"
    volumes:
      - ./logs:/app/logs
      - ./offload:/app/offload
      - ./hf_cache:/app/.cache/huggingface
    gpus: all
    restart: unless-stopped

